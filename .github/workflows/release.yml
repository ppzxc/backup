name: Release Rust CLI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools || true
      - name: Build release binary (static musl)
        run: cargo build --release --target x86_64-unknown-linux-musl
      - name: Package binary
        run: |
          TAG=${GITHUB_REF_NAME}
          TARGET="x86_64-unknown-linux-musl"
          TAR_NAME="backup-${TAG}-${TARGET}.tar.gz"
          tar -czvf "${TAR_NAME}" -C target/x86_64-unknown-linux-musl/release backup
          echo "TAR_NAME=${TAR_NAME}" >> $GITHUB_ENV
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.TAR_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
