name: Release Rust CLI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools || true
      - name: Verify Git Tag matches Cargo.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(cargo metadata --format-version 1 | jq -r '.packages[] | select(.name=="backup") | .version')
          echo "Git Tag Version: $TAG_VERSION, Cargo.toml Version: $CARGO_VERSION"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "Error: Git tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)!"
            exit 1
          fi
      - name: Build release binary (static musl)
        run: cargo build --release --target x86_64-unknown-linux-musl
      - name: Package binary
        run: |
          TAG=${GITHUB_REF_NAME}
          TARGET="x86_64-unknown-linux-musl"
          TAR_NAME="backup-${TAG}-${TARGET}.tar.gz"
          tar -czvf "${TAR_NAME}" -C target/x86_64-unknown-linux-musl/release backup
          echo "TAR_NAME=${TAR_NAME}" >> $GITHUB_ENV
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.TAR_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
