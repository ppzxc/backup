name: Version Bump Check

on:
  pull_request:
    branches:
      - main

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Version Bump on backup.sh Change
        run: |
          # Fetch origin main to compare
          git fetch origin main:main || git fetch origin main

          # Check if backup.sh was modified between main and current branch (HEAD)
          if git diff --name-only origin/main...HEAD | grep -q "^backup.sh$"; then
            PR_VER=$(grep -E '^BACKUP_SCRIPT_VERSION=' backup.sh | cut -d'"' -f2)
            BASE_VER=$(git show origin/main:backup.sh | grep -E '^BACKUP_SCRIPT_VERSION=' | cut -d'"' -f2 || echo "none")

            echo "PR Version:  $PR_VER"
            echo "Base Version: $BASE_VER"

            if [ "$PR_VER" = "$BASE_VER" ]; then
              echo "::error::backup.sh was modified, but BACKUP_SCRIPT_VERSION was not bumped (currently $PR_VER)."
              exit 1
            fi
            echo "Version bumped successfully from $BASE_VER to $PR_VER."
          else
            echo "backup.sh was not modified in this PR. Skipping version bump check."
          fi
