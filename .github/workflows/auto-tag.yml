name: Auto Tagging on Merge

on:
  push:
    branches:
      - main
    paths:
      - 'backup.sh'

permissions:
  contents: write

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and Push Tag
        run: |
          VERSION=$(grep -E '^BACKUP_SCRIPT_VERSION=' backup.sh | cut -d'"' -f2)
          TAG_NAME="v$VERSION"

          # Check if tag already exists in the repository
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            TAG_COMMIT=$(git rev-list -n 1 "$TAG_NAME")
            HEAD_COMMIT=$(git rev-parse HEAD)
            if [ "$TAG_COMMIT" != "$HEAD_COMMIT" ]; then
              echo "::error::Tag $TAG_NAME already exists but points to a different commit ($TAG_COMMIT vs HEAD $HEAD_COMMIT)."
              echo "Please make sure to bump the BACKUP_SCRIPT_VERSION in backup.sh."
              exit 1
            else
              echo "Tag $TAG_NAME already exists and points to the current HEAD."
            fi
          else
            echo "Creating and pushing tag $TAG_NAME pointing to HEAD"
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
            git push origin "$TAG_NAME"
          fi
