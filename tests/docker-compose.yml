services:
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: e2e-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data
    ports:
      - "9000:9000"

  sftp:
    image: atmoz/sftp:alpine
    container_name: e2e-sftp
    command: backupuser:backuppass:::upload
    ports:
      - "2222:22"

  mariadb-5:
    image: mariadb:5.5
    container_name: e2e-mariadb-5
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: testdb_legacy
    ports:
      - "33061:3306"

  mariadb-latest:
    image: mariadb:10.11
    container_name: e2e-mariadb-latest
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: testdb_latest
    ports:
      - "33062:3306"

  postgres-latest:
    image: postgres:16-alpine
    container_name: e2e-postgres-latest
    environment:
      POSTGRES_PASSWORD: pgpass
      POSTGRES_DB: pg_testdb
    ports:
      - "54321:5432"

  backup-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.rocky9
    container_name: e2e-backup-runner
    depends_on:
      - minio
      - sftp
      - mariadb-5
      - mariadb-latest
      - postgres-latest
    entrypoint: ["tail", "-f", "/dev/null"]
